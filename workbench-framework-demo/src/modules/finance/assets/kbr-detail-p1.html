<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Workbench — KBR Overview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.22.2/dist/reset.css" />
<style>
* { box-sizing: border-box; }
body { margin: 0; }
.root-layout { height: 100vh; overflow: hidden; }
.main-layout { display: flex !important; flex-direction: column !important; overflow: hidden !important; height: 100% !important; }

.sider-inner { display:flex; flex-direction:column; align-items:center; height:100%; padding:12px 0; gap:4px; }
.s-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.45); cursor:pointer; transition:all .15s; }
.s-icon:hover { background:rgba(255,255,255,.1); color:rgba(255,255,255,.7); }
.s-icon.active { background:#1677ff; color:#fff; }
.s-icon svg { width:18px; height:18px; }

.topnav { background:#fff !important; border-bottom:1px solid #f0f0f0; height:52px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.user-name { font-size:13px; font-weight:600; line-height:1.4; }
.user-role { font-size:11px; color:#8c8c8c; line-height:1.4; }

.back-bar { background:#fff; padding:7px 24px; border-bottom:1px solid #f0f0f0; flex-shrink:0; }
.identity-bar { background:#fafafa; border-bottom:1px solid #f0f0f0; padding:9px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.id-name { font-size:15px; font-weight:700; }
.id-sep { color:#d9d9d9; }
.id-sub { font-size:13px; color:#595959; }

.steps-bar { background:#fff; border-bottom:1px solid #f0f0f0; padding:0 24px; flex-shrink:0; }
.steps-bar .ant-steps { padding:10px 0; }

.global-bar { background:#fff; border-bottom:1px solid #f0f0f0; padding:6px 24px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.global-panel { background:#fafafa; border-bottom:1px solid #f0f0f0; padding:12px 24px; flex-shrink:0; }

.content-area { flex:1; overflow-y:auto; padding:20px 24px 32px; background:#f5f5f5; }

/* Row type colors for AntD table */
.ant-table-tbody > tr.tx-fulfillment > td { background:#f6ffed !important; }
.ant-table-tbody > tr.tx-return      > td { background:#fff1f0 !important; }
.ant-table-tbody > tr.tx-comp        > td { background:#e6f4ff !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

// ── Transaction data ───────────────────────────────────────────────────

];

  if (v === null || v === undefined || v === '—' || v === 0) {
    return <span style={{color:'#bfbfbf'}}>{v === 0 ? '0' : '—'}</span>;
  }
  if (isAmt && typeof v === 'number') {
    return <span style={{color: v < 0 ? '#ff4d4f' : '#141414', fontVariantNumeric:'tabular-nums', fontWeight:600}}>{v < 0 ? '-' : ''}{Math.abs(v).toLocaleString()}</span>;
  }
  return v;
};

const TX_COLS = [
  { title:'Booking No.',        dataIndex:'bookingNo',   key:'bk',   fixed:'left', width:120, render:v=><code style={{fontSize:11,fontWeight:600}}>{v}</code> },
  { title:'Klook Ref.',         dataIndex:'klookRef',    key:'kref', width:170, render:v=><code style={{fontSize:11}}>{v}</code> },
  { title:'Type',               dataIndex:'txType',      key:'type', width:120,
    render:v => { const c = v==='Fulfillment'?'success':v==='Return'?'error':'processing'; return <Tag color={c}>{v}</Tag>; }
  },
  { title:'Transaction No.',    dataIndex:'txNo',        key:'txno', width:180, render:v=><code style={{fontSize:11}}>{v}</code> },
  { title:'Merchant Booking',   dataIndex:'merchantBK',  key:'mbk',  width:170, render:v=><code style={{fontSize:11}}>{v}</code> },
  { title:'Booking Time',       dataIndex:'bookingTime', key:'bt',   width:145, render:v=><span style={{fontSize:11,color:'#595959'}}>{v}</span> },
  { title:'Confirm Time',       dataIndex:'confirmTime', key:'ct',   width:145, render:v=><span style={{fontSize:11,color:'#595959'}}>{v}</span> },
  { title:'Settle Condition',   dataIndex:'settleCond',  key:'sc',   width:130 },
  { title:'Settlement Time',    dataIndex:'settleTime',  key:'st',   width:145, render:v=><span style={{fontSize:11,color:'#595959'}}>{v}</span> },
  { title:'Posting Time',       dataIndex:'postingTime', key:'pt',   width:145, render:v=><span style={{fontSize:11,color:'#595959'}}>{v}</span> },
  { title:'Product No.',        dataIndex:'productNo',   key:'pno',  width:120, render:v=><code style={{fontSize:11}}>{v}</code> },
  { title:'Product Name',       dataIndex:'productName', key:'pn',   width:240, ellipsis:true, render:v=><Tooltip title={v}>{v}</Tooltip> },
  { title:'Variant No.',        dataIndex:'variantNo',   key:'vno',  width:100, render:v=><code style={{fontSize:11}}>{v}</code> },
  { title:'Variant Name',       dataIndex:'variantName', key:'vn',   width:140 },
  { title:'Sub Voucher',        dataIndex:'subVoucher',  key:'sv',   width:120 },
  { title:'Unit Full Cost',     dataIndex:'unitFullCost',key:'ufc',  width:120, align:'right', render:v=>r(v,true) },
  { title:'Unit Cost',          dataIndex:'unitCost',    key:'uc',   width:100, align:'right', render:v=>r(v,true) },
  { title:'Fee',                dataIndex:'fee',         key:'fee',  width:80,  align:'right', render:v=>r(v,true) },
  { title:'Fee Details',        dataIndex:'feeDetails',  key:'fd',   width:150 },
  { title:'# Units',            dataIndex:'numUnits',    key:'nu',   width:80,  align:'right', render:v=>r(v,true) },
  { title:'Discount',           dataIndex:'discount',    key:'disc', width:90,  align:'right', render:v=>r(v,true) },
  { title:'Discount Details',   dataIndex:'discountDetails',key:'dd', width:160 },
  { title:'Cancel Fee',         dataIndex:'cancelFee',   key:'cf',   width:100, align:'right', render:v=>r(v,true) },

const STEP_PAGES = [null, 'kbr-detail-p2.html', 'kbr-detail-p3.html', 'kbr-detail-p4.html', null, 'kbr-detail-p6.html'];

// ── App ────────────────────────────────────────────────────────────────
const App = () => {
  const [merchantOpen, setMerchantOpen] = useState(false);
  const [globalPanel, setGlobalPanel]   = useState(null); // null | 'deduction' | 'attachments'
  const [dedReason,   setDedReason]     = useState('');
  const [dedAmount,   setDedAmount]     = useState('');
  const [txSearch,    setTxSearch]      = useState('');
  const [txType,      setTxType]        = useState('');

    return true;

    <ConfigProvider theme={{ token:{ fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif', fontSize:13, borderRadius:6, colorPrimary:'#1677ff' }}}>

        {/* Sidebar */}

              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

            <div style={{marginTop:'auto'}}>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>

            </div>
          </div>

              <span className="id-sep">·</span>
              <code style={{fontSize:12,color:'#595959'}}>KBR2411088001</code>

            <Space size={6}>

              size="small"

                { title:'Approval' },

              ]}

                    value={234500} valueStyle={{fontSize:24,fontWeight:700}}
                    prefix="¥" />
                  <div style={{fontSize:12,color:'#8c8c8c',marginTop:2}}>Gross settlement amount</div>
                </Card>
              </Col>
              <Col span={6}>
                <Card size="small" style={{borderRadius:8}}>
                  <div style={{fontSize:11,color:'#8c8c8c',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:8}}>Settlement Period</div>
                  <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Nov 01 – Nov 30</div>
                  <div style={{fontSize:11,color:'#8c8c8c',fontFamily:'monospace'}}>2024-11-01 ~ 2024-11-30</div>
                </Card>
              </Col>
              <Col span={6}>
                <Card size="small" style={{borderRadius:8}}>
                  <div style={{fontSize:11,color:'#8c8c8c',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:8}}>Reconciliation Status</div>
                  <Tag color="warning" style={{fontSize:13,padding:'3px 10px',fontWeight:600}}>Not Started</Tag>
                  <div style={{fontSize:12,color:'#8c8c8c',marginTop:6}}>No statement uploaded yet</div>
                </Card>
              </Col>
            </Row>

            {/* Body layout */}
            <Row gutter={16} align="top">

              {/* Left: Transaction table */}
              <Col flex="1" style={{minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <span style={{fontSize:15,fontWeight:700}}>Transaction Details</span>
                  <span style={{fontSize:12,color:'#8c8c8c'}}>Data as of 2024-12-01 · Transaction granularity</span>
                </div>
                <Space style={{marginBottom:10}} wrap>
                  <Button size="small" icon={<span>↓</span>}>Export KBR Details (Excel)</Button>
                  <Button size="small" icon={<span>✉</span>}>Send to Merchant</Button>
                  <Input size="small" placeholder="Search by Booking No." style={{width:200}} value={txSearch} onChange={e=>setTxSearch(e.target.value)} allowClear />
                  <Select size="small" placeholder="All Types" style={{width:130}} value={txType||undefined} onChange={v=>setTxType(v||'')} allowClear
                    options={[{value:'Fulfillment',label:'Fulfillment'},{value:'Return',label:'Return'},{value:'Compensation',label:'Compensation'}]} />
                </Space>
                <Card style={{borderRadius:8}} styles={{body:{padding:0}}}>
                  <Table
                    dataSource={displayTx}
                    columns={TX_COLS}
                    rowKey="key"
                    size="small"
                    scroll={{ x: 3400 }}
                    pagination={{ pageSize:6, size:'small', showTotal:(t,r)=>`Showing ${r[0]}–${r[1]} of ${t} transactions` }}
                    rowClassName={r => r.txType==='Fulfillment'?'tx-fulfillment':r.txType==='Return'?'tx-return':'tx-comp'}
                    footer={() => (
                      <span style={{fontSize:12,color:'#8c8c8c',fontStyle:'italic'}}>
                        Reconciliation will compare against merchant statement at Booking No. level (transactions aggregated per booking).
                      </span>
                    )}
                  />
                </Card>
              </Col>

              {/* Right: panels */}
              <Col style={{width:300,flexShrink:0}}>
                <Space direction="vertical" style={{width:'100%'}} size={12}>

                  {/* System Issues */}
                  <Card
                    size="small"
                    style={{borderLeft:'4px solid #faad14',borderRadius:8}}
                    styles={{header:{background:'#fffbe6'},body:{padding:'12px 14px'}}}
                    title={
                      <Space>
                        <span style={{fontSize:13,fontWeight:700}}>⚠ System-Detected Issues</span>
                        <Tag color="error">1</Tag>
                      </Space>
                    }
                  >
                    <Space align="start" size={10}>
                      <span style={{color:'#fa8c16',fontSize:16,flexShrink:0}}>⚠</span>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,marginBottom:3}}>Merchant Payment Info Unverified</div>
                        <div style={{fontSize:12,color:'#595959',lineHeight:1.5,marginBottom:6}}>
                          Bank account not submitted for approval. Will auto-resolve when merchant completes verification.
                        </div>
                        <Button type="link" size="small" style={{padding:0,fontSize:12}}>Send Reminder to BD →</Button>
                      </div>
                    </Space>
                    <div style={{fontSize:11,color:'#8c8c8c',fontStyle:'italic',marginTop:8}}>
                      No direct AP action needed at this stage — monitoring only.
                    </div>
                  </Card>

                  {/* Next Step */}
                  <Card size="small" style={{borderRadius:8}} styles={{body:{padding:'14px'}}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>Next Step</div>
                    <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>Start Reconciliation</div>
                    <div style={{fontSize:12,color:'#595959',lineHeight:1.5,marginBottom:12}}>
                      When you have the merchant's statement, proceed to Step 2 to upload and reconcile against this KBR.
                    </div>
                    <Button type="primary" block href="kbr-detail-p2.html">
                      Proceed to Reconciliation →
                    </Button>
                    <Divider style={{margin:'10px 0'}} />
                    <Button type="link" block style={{fontSize:12,color:'#595959'}} href="kbr-detail-p3.html">
                      Record proactive adjustment in Step 3 →
                    </Button>
                  </Card>

                </Space>
              </Col>
            </Row>
          </div>

        </Layout>
      </Layout>
    </ConfigProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
